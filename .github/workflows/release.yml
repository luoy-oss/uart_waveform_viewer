name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build single-file HTML
        run: node scripts/build.mjs

      - name: Create ZIP package
        run: |
          cd dist
          zip uart_waveform_viewer.zip uart_waveform_viewer.html
          cd ..
          cp README.md dist/
          cp README-EN.md dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/uart_waveform_viewer.html
            dist/uart_waveform_viewer.zip
          generate_release_notes: true
          draft: false
          prerelease: false
